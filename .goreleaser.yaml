version: 2

project_name: agent-debugboardctl

release:
  disable: true

builds:
  - id: agent-debugboardctl
    main: ./cmd/agent-debugboardctl
    binary: agent-debugboardctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath

archives:
  - id: agent-debugboardctl
    ids:
      - agent-debugboardctl
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - README.zh-CN.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
