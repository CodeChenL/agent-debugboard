# OpenOCD example for a target debug port wired directly to CH347F.
#
# This file is intentionally a template because CH347F support depends on the
# OpenOCD build and adapter driver naming provided by the vendor/distribution.
# Replace the interface line below with the CH347F interface script available
# on your host, then select the real target configuration.
#
# Example usage:
#
#   openocd -f doc/openocd/ch347-example.cfg -f target/<target>.cfg

# source [find interface/ch347.cfg]

# Common adapter settings. Adjust for target signal integrity.
transport select jtag
adapter speed 1000

# If the target uses SWD and your CH347F/OpenOCD build supports SWD, use:
# transport select swd
