name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout application
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag }}
          path: app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: app/go.sum

      - name: Set up Zephyr workspace
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: app
          toolchains: arm-zephyr-eabi
          sdk-version: "1.0.1"

      - name: Run unit tests
        working-directory: app
        run: ./apps/agent_debugboard/tests/run_unit_tests.sh

      - name: Smoke test local host CLI build
        working-directory: app
        run: |
          go build -trimpath -o /tmp/agent-debugboardctl ./cmd/agent-debugboardctl
          /tmp/agent-debugboardctl --help
          /tmp/agent-debugboardctl --version

      - name: Build firmware
        run: |
          west build -p always -b rpi_pico/rp2040 app/apps/agent_debugboard -d build/agent_debugboard
          mkdir -p app/dist/release
          cp build/agent_debugboard/zephyr/zephyr.uf2 app/dist/release/agent-debugboard-rp2040.uf2
          cp build/agent_debugboard/zephyr/zephyr.elf app/dist/release/agent-debugboard-rp2040.elf
          cp build/agent_debugboard/zephyr/zephyr.map app/dist/release/agent-debugboard-rp2040.map

      - name: Build host CLI release archives
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: app

      - name: Prepare release assets
        working-directory: app
        run: |
          cp dist/*.tar.gz dist/release/
          cp dist/*.zip dist/release/
          cd dist/release
          sha256sum \
            agent-debugboard-rp2040.elf \
            agent-debugboard-rp2040.map \
            agent-debugboard-rp2040.uf2 \
            agent-debugboardctl_* > SHA256SUMS.txt

      - name: Write release notes
        working-directory: app
        run: |
          cat > dist/release-notes.md <<EOF
          Agent DebugBoard ${{ steps.release.outputs.tag }}

          Included assets:
          - RP2040 firmware: UF2, ELF, and MAP
          - agent-debugboardctl native packages for macOS, Linux, and Windows on amd64/arm64
          - SHA256SUMS.txt for release asset verification
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        working-directory: app
        run: |
          gh release create "$RELEASE_TAG" dist/release/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes-file dist/release-notes.md
